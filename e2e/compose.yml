services:
  server:
    container_name: server
    networks:
      - default
    build:
      context: server
      dockerfile: Dockerfile

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 2s

  mock-server:
    container_name: mock_server
    networks:
      - default
    build:
      context: server
      dockerfile: Dockerfile.mock
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  e2e:
    container_name: e2e_tests
    networks:
      - default
    build:
      context: ../
      dockerfile: e2e/Dockerfile
    depends_on:
      server:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      - TEST_CONFIG=${TEST_CONFIG:-config.api.yml}
      - TEST_TAGS=${TEST_TAGS:-~@FRONTEND}
      - RUN_ID=${RUN_ID:-local}
    command: >
      sh -c '
      if grep -q "frontend:" /app/e2e/$$TEST_CONFIG; then
        echo "Installing browser driver...";
        /app/tkit install --config=/app/e2e/$$TEST_CONFIG || exit 1;
      fi &&
      /app/tkit run
      --config=/app/e2e/$$TEST_CONFIG
      --location=./features
      --timeout=10s
      --env-file=./env.test.yml
      --tags="$$TEST_TAGS"'
    working_dir: /app/e2e
    volumes:
      - ../:/app

networks:
  default:
    driver: bridge
