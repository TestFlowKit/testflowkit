settings:
  page_load_timeout: 30000
  think_time: 10000
  video_recording: false
  concurrency: 1
  report_format: "html"
  gherkin_location: "e2e/features"

frontend:
  driver: "{{ env.driver }}"
  default_timeout: 1000
  headless: true
  screenshot_on_failure: true
  elements:
    common:
      visual_test_button:
        - "button"
      textarea_field:
        - "#textarea"
      double_click_button:
        - "#dbclick-btn"
      test_radio_button:
        - "#radio1"
      second_test_radio_button:
        - "#radio2"
      nonexistent_button:
        - "#inexistent"
      hidden_button:
        - "#hidden-btn"
      product_name_element:
        - "#product-name"
      non-existent_button:
        - "#non-existent"
      product_description_element:
        - "#product-description"
      scroll_target_element:
        - "#target-element"
      computer_details:
        - "#computer-details"

    form_e2e:
      page_title:
        - "#page-title"
      text_field:
        - "xpath://*[@id='text']"
      test_checkbox:
        - "#checkbox"
        - "#rtt"
        - "input[type='checkbox']"
      test_dropdown:
        - "#select"
      multiple_dropdown:
        - "#select-multiple"

    file_upload_e2e:
      avatar_field:
        - "input[type='file'][name='avatar']"
        - "#avatar-upload"
      gallery_field:
        - "input[type='file'][name='gallery'][multiple]"
        - "#gallery-upload"
      document_field:
        - "input[type='file'][name='document']"
      data_field:
        - "input[type='file'][name='data']"
        - "#data-upload"
      upload_button:
        - "#upload-btn"
        - "button[type='submit']"
      status_message:
        - "#status-message"
      file_list:
        - "#file-list"
      files_uploaded_block:
        - "#file-items"

  pages:
    form_e2e: "form"
    file_upload_e2e: "file-upload"
    google: "{{ env.google_url }}"
    visual_e2e: "visual"
    table_e2e: "/table"
    details_e2e: "/details"
    scroll_e2e: "/scroll"

files:
  base_directory: "./test-files"
  definitions:
    profile_image: "images/profile.jpg"
    test_document: "documents/test.pdf"
    sample_csv: "data/sample.csv"
    gallery_image: "images/gallery/IMG_1000.jpeg"
