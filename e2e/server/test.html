<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        .file-item {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .file-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div id="file-list">
        <div class="file-item" id="file1">Document 1</div>
        <div class="file-item" id="file2">Document 2</div>
    </div>

    <script>
        // Double click handler
        document.querySelectorAll('.file-item').forEach(item => {
            item.addEventListener('dblclick', function() {
                if (confirm('Are you sure you want to open ' + this.textContent + '?')) {
                    alert('Opening ' + this.textContent);
                }
            });
        });
    </script>
</body>
</html>
