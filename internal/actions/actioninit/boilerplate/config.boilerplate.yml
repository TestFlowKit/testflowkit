settings:
  concurrency: 1
  report_format: "html"
  gherkin_location: "./features"

# Environment Variables
# Access these in Gherkin files and config using {{ env.variable_name }}
env:
  base_url: "https://testflowkit.github.io"
frontend:
  base_url: "{{ env.base_url }}"
  driver: "rod"
  default_timeout: 10000
  headless: false
  screenshot_on_failure: true
  think_time: 500  # Delay in milliseconds between browser actions (0 in headless mode)
  
  # Browser Configuration (optional)
  # user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  # locale: "en-US"  # Browser locale (e.g., "en-US", "fr-FR", "de-DE")
  # timezone_id: "America/New_York"  # IANA timezone (e.g., "Europe/Paris", "Asia/Tokyo")

  elements:
    common:
      page_body:
        - "body"
      get_started_button:
        - "xpath://a[contains(text(), 'Get Started Now')]"

      sentence_filter_field:
        - "input[placeholder*='Search step definitions...']"

  pages:
    home: "/"
    sentences: "/sentences"

# Security Schemes (optional)
# Named credentials used by REST and GraphQL APIs.
# Reference a scheme from an api definition with:
#   security_ref:
#     name: <scheme_name>
# Disable inherited auth with:
#   security_ref:
#     name: none
#
# security_schemes:
#   my_bearer:
#     type: bearer
#     token: "{{ env.API_TOKEN }}"           # static token
#
#   my_basic:
#     type: basic
#     username: "{{ env.API_USER }}"
#     password: "{{ env.API_PASS }}"
#
#   my_apikey:
#     type: apikey
#     key: "{{ env.API_KEY }}"
#     placement: header                       # header | query | cookie
#     header_name: "X-API-Key"               # default: Authorization
#
#   my_oauth2:
#     type: oauth2
#     client_id: "{{ env.CLIENT_ID }}"
#     client_secret: "{{ env.CLIENT_SECRET }}"
#     token_url: "https://auth.example.com/oauth/token"
#     token_endpoint_auth_method: client_secret_post   # required: client_secret_post | client_secret_basic
#     scopes: ["read", "write"]
#     persist: true                           # cache token in testflowkit.lock
#     duration: "1h"                          # override reported expiry
#     retry_on_401: true                      # re-fetch token once on 401
#     # proxy_url: "http://proxy.corp:8080"   # optional per-scheme proxy
#
# # Project-wide default (applied when no api-level or endpoint-level security is set)
# default_security: my_oauth2

