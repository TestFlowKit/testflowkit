name: Pull request CI

on:
  pull_request:
    branches:
      - "*"

permissions:
  contents: read
  actions: write

env:
  BRANCH_NAME_REGEX: "^(docs|feat|fix|perf|refactor|revert|style|test|chore|releases)/"
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
jobs:
  quality_check:
    name: code_quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup nodeJS
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install commitlint
        run: |
          yarn init --yes
          yarn add @commitlint/config-conventional commitlint@latest  validate-branch-name

      - name: Validate PR commits with commitlint
        run: npx commitlint --from ${{ github.event.pull_request.head.sha }}~${{ github.event.pull_request.commits }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0


      - name: Run unit tests
        run: go test ./...

      - name: Export and validate step definitions catalog
        run: |
          mkdir -p build
          go run ./cmd/testflowkit/*.go export-step-definitions --format json > build/step-definitions.json
          jq -e 'type == "array" and length > 0' build/step-definitions.json
          jq -e '.[0] | has("sentence") and has("description") and has("categories")' \
            build/step-definitions.json

      - name: Run npm package tests
        working-directory: ./npm
        run: |
          yarn install --frozen-lockfile --ignore-optional
          yarn test

      - name: Build and test testflowkit-mcp
        working-directory: ./packages/testflowkit-mcp
        run: |
          yarn
          yarn build
          yarn test


  e2e_tests:
    uses: "./.github/workflows/e2e.yml"
    permissions:
      contents: read
      actions: write
