name: Publish Canary

# Triggers:
#   - Every push to main → always a fresh canary available
#   - Manual dispatch   → useful for testing from any branch
on:
  push:
    # branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ── 1. Compile binaries inline (no GitHub Release exists yet) ───────────
  #
  #  Canary version format: {last-semver-tag}-canary.{short-sha}
  #  e.g.  1.2.3-canary.abc1234
  #
  prepare:
    name: Build binaries & resolve canary version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.canary }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Resolve canary version
        id: version
        run: |
            BASE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            SHORT_SHA=$(git rev-parse --short HEAD)
            CANARY_VERSION="${BASE_TAG}-canary.${SHORT_SHA}"
            echo "canary=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Canary version: ${CANARY_VERSION}"

      - name: Build Go binaries for all platforms
        run: make releases

      - name: Upload binaries as workflow artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: canary-binaries
          path: build/*.zip
          retention-days: 1

  # ── 2. Export step definitions catalog & publish as versioned canary release ─
  #
  #  Runs in parallel with 'prepare' — no dependency on the binaries.
  #  Version is resolved inline (same logic as 'prepare') so the job does not
  #  need to wait for binary compilation.
  #
  #  Each canary push produces a distinct GitHub prerelease aligned exactly
  #  with the npm canary version:
  #    releases/download/{base-tag}-canary.{short-sha}/step-definitions.json
  #
  publish-catalog:
    name: Publish step definitions to canary release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Export step definitions catalog
        run: make export-step-definitions

      - name: Publish versioned canary GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          CANARY_VERSION="${BASE_TAG}-canary.${SHORT_SHA}"

          # Idempotent: delete any existing release for this version before
          # re-creating it (handles workflow_dispatch re-runs on the same commit).
          gh release delete "${CANARY_VERSION}" --yes 2>/dev/null || true

          # --target pins the tag to the exact commit being built, not the
          # default branch HEAD at creation time.
          gh release create "${CANARY_VERSION}" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Canary ${CANARY_VERSION}" \
            --notes "Step definitions catalog for canary build \`${CANARY_VERSION}\`.

Matches npm \`@testflowkit/cli@${CANARY_VERSION}\`.
" \
            build/step-definitions.json

  # ── 3. Publish all packages via the shared reusable workflow ─────────────
  #      Published under the 'canary' dist-tag — never touches 'latest'.
  publish:
    name: Publish all packages
    needs: prepare
    uses: ./.github/workflows/_publish-packages.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      artifact-name: canary-binaries
      npm-tag: canary
    secrets: inherit
