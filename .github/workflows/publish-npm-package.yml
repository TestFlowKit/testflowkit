name: publish NPM Package

on:
  workflow_call:
  workflow_dispatch:

jobs:
  # ── 1. Download the release ZIPs from GitHub Releases and cache them ─────
  prepare:
    name: Prepare release artifacts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get release version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${LATEST_TAG}"

      - name: Download release binaries from GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_SEMANTIC_RELEASE }}
        run: |
          mkdir -p build
          gh release download "${{ steps.version.outputs.tag }}" \
            --dir build/ \
            --pattern "*.zip"
          echo "Downloaded artifacts:"
          ls -1 build/

      - name: Upload binaries as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: build/*.zip
          retention-days: 1

  # ── 2. Publish all packages via the shared reusable workflow ─────────────
  publish:
    name: Publish all packages
    needs: prepare
    uses: ./.github/workflows/_publish-packages.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      artifact-name: release-binaries
      npm-tag: latest
    secrets: inherit