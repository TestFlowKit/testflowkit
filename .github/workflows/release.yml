name: Releases Building CI

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write
  checks: write
  id-token: write
  pages: write
  actions: write


jobs:
  validate_release_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch_name="${{ github.ref_name }}"
          if [[ "$branch_name" == 'main' ]]; then
            echo "'$branch_name' is valid."
          else
            echo "Error: '$branch_name' is not valid."
          fi

  quality_check:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: validate_release_branch

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
      
      - name: Run Unit Tests
        run: go test ./...

  e2e_tests:
    needs: validate_release_branch
    uses: ./.github/workflows/e2e.yml

  release:
    needs:
      - quality_check
      - e2e_tests
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install Semantic Release
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/git \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Run Semantic Release (Create Tag)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx semantic-release

      - name: Set Up Go Environment
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Build Go Binaries with Version Tag
        run: |
          # Fetch the latest tags to ensure we have the newly created tag
          git fetch --tags
          make releases

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "Latest tag: $LATEST_TAG"

          for file in build/*.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file to release $LATEST_TAG"
              gh release upload "$LATEST_TAG" "$file" --clobber
            fi
          done

  publish_npm_package:
    needs:
      - release
    uses: "./.github/workflows/publish-npm-package.yml"
    secrets: inherit

  deploy_doc:
    needs:
      - release
    uses: "./.github/workflows/deploy-pages.yml"

